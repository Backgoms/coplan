name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack (workspace packages)
        shell: bash
        run: |
          set -euo pipefail
          for dir in packages/coplan-cli packages/coplan-auth packages/coplan-mcp; do
            echo "Packing $dir"
            (cd "$dir" && npm pack --silent >/dev/null)
          done
