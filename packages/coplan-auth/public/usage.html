<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coplan Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/dashboard/usage.css" />
  </head>
  <body>
    <main class="card">
      <header class="top">
        <div class="title">
          <div class="title-row">
            <h1>Coplan Dashboard</h1>
            <span id="codex-indicator" class="pill pill-unknown">ChatGPT: unknown</span>
            <span id="codex-model" class="meta">Model: -</span>
          </div>
          <p class="sub">Local token usage for <code>codex_plan_review</code> (best-effort logging).</p>
        </div>
        <div class="controls">
          <select id="theme" aria-label="Theme" title="Theme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <select id="days" aria-label="Window" title="Window">
            <option value="7">7 days</option>
            <option value="30" selected>30 days</option>
            <option value="90">90 days</option>
          </select>
          <button id="refresh" class="btn" type="button">Refresh</button>
        </div>
      </header>

      <section class="grid" aria-label="Totals">
        <div class="metric">
          <div class="k">Total</div>
          <div class="v" id="m-total">-</div>
        </div>
        <div class="metric">
          <div class="k">Input</div>
          <div class="v" id="m-input">-</div>
        </div>
        <div class="metric">
          <div class="k">Output</div>
          <div class="v" id="m-output">-</div>
        </div>
        <div class="metric">
          <div class="k">Cached input</div>
          <div class="v" id="m-cached">-</div>
        </div>
        <div class="metric">
          <div class="k">Events</div>
          <div class="v" id="m-count">-</div>
        </div>
      </section>

      <section class="section">
        <h2>By day</h2>
        <div id="daily" class="table" role="region" aria-label="Daily totals"></div>
      </section>

      <section class="section">
        <h2>Requests</h2>
        <div id="events" class="table" role="region" aria-label="Recent events"></div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>

      <div id="model-controls" class="model-controls" aria-label="Model selection">
        <select id="cli-model" aria-label="Codex model" title="Codex model">
          <option value="">(model)</option>
        </select>
        <select id="cli-effort" aria-label="Reasoning effort" title="Reasoning effort">
          <option value="">(effort)</option>
        </select>
        <button id="set-cli" class="btn secondary" type="button">Set</button>
      </div>

      <p class="hint">
        Data source: <code id="usage-path">-</code>
      </p>
    </main>

    <div class="floating" aria-label="ChatGPT auth">
      <button id="codex-login" class="btn" type="button">ChatGPT Login</button>
      <button id="codex-logout" class="btn secondary" type="button">ChatGPT Logout</button>
    </div>
    <script src="/dashboard/usage.js"></script>
  </body>
</html>
