<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>coplan login</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <h1>coplan login (openai legacy)</h1>
      <p>This mode stores OpenAI API key locally. Use only when env-based login is unavailable.</p>
      <form id="login-form">
        <label for="access_token">OpenAI API Key</label>
        <input id="access_token" name="access_token" type="password" autocomplete="off" required />
        <button type="submit">Save Key</button>
      </form>
      <p id="status" role="status" aria-live="polite"></p>
      <p class="hint">Stored at <code>~/.coplan/auth.json</code> (or %USERPROFILE%\.coplan\auth.json on Windows).</p>
      <p class="hint"><a class="link" href="/dashboard/usage">Open usage dashboard</a></p>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
